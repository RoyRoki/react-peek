<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #60a5fa;
    }
    .header .logo {
      width: 24px;
      height: 24px;
      background: #3b82f6;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .desc {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .toggle-btn {
      width: 100%;
      padding: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .toggle-btn:hover { background: #2563eb; }
    .toggle-btn.active { background: #ef4444; }
    .toggle-btn.active:hover { background: #dc2626; }
    .shortcut {
      margin-top: 12px;
      font-size: 11px;
      color: #64748b;
      text-align: center;
    }
    .shortcut kbd {
      background: #1e293b;
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid #334155;
      font-family: 'SF Mono', monospace;
    }
    .status {
      margin-top: 12px;
      padding: 8px;
      background: #1e293b;
      border-radius: 6px;
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
    }
    .status.react { border: 1px solid #22c55e33; color: #22c55e; }
    .status.no-react { border: 1px solid #ef444433; color: #ef4444; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">R</div>
    <h1>ReactPeek</h1>
  </div>
  <p class="desc">Click any React component to copy its source location. Perfect for AI agent prompts.</p>
  <button id="toggle" class="toggle-btn">Activate Inspector</button>
  <div class="shortcut">Shortcut: <kbd>Cmd+Shift+X</kbd></div>
  <div id="status" class="status">Checking page...</div>
  <script src="popup.js"></script>
</body>
</html>
